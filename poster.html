<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>戒菸海報｜番路鄉衛生所</title>
  <style>
    @page { size: A4 portrait; margin: 0; }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 210mm;
      height: 297mm;
      font-family: -apple-system, 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
      background: white;
      overflow: hidden;
      color: #1a1a1a;
    }

    /* ── 版面分區 ── */
    .poster {
      width: 210mm;
      height: 297mm;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 60%, #388e3c 100%);
      padding: 8mm 10mm 6mm;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header-left { color: white; }
    .header-org  { font-size: 18pt; font-weight: 900; letter-spacing: 2px; }
    .header-sub  { font-size: 9pt; opacity: .85; margin-top: 2px; letter-spacing: 1px; }
    .header-icon { font-size: 36pt; }

    /* ── 主視覺 ── */
    .hero {
      background: linear-gradient(180deg, #e8f5e9 0%, #f1f8e9 100%);
      padding: 7mm 10mm 4mm;
      text-align: center;
      flex-shrink: 0;
    }
    .hero-emoji { font-size: 32pt; display: block; margin-bottom: 2mm; }
    .hero-title {
      font-size: 28pt; font-weight: 900;
      color: #1b5e20; line-height: 1.2;
      letter-spacing: 2px;
    }
    .hero-title span { color: #f57c00; }
    .hero-subtitle {
      font-size: 11pt; color: #4caf50; font-weight: 700;
      margin-top: 2mm; letter-spacing: 2px;
    }

    /* ── QR 區 ── */
    .qr-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 5mm 10mm 4mm;
      flex: 1;
      justify-content: center;
    }
    .qr-frame {
      border: 3pt solid #2e7d32;
      border-radius: 8mm;
      padding: 4mm;
      background: white;
      box-shadow: 0 2mm 8mm rgba(46,125,50,.15);
    }
    .qr-frame img { display: block; width: 58mm; height: 58mm; }
    .qr-caption {
      font-size: 10pt; color: #555; margin-top: 3mm;
      letter-spacing: 1px; text-align: center;
    }
    .qr-arrow {
      font-size: 14pt; margin-bottom: 1mm; color: #2e7d32;
    }

    /* ── 特色列 ── */
    .features {
      display: flex;
      justify-content: center;
      gap: 4mm;
      padding: 3mm 8mm 4mm;
      flex-shrink: 0;
    }
    .feat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5mm;
      background: white;
      border: 1.5pt solid #a5d6a7;
      border-radius: 4mm;
      padding: 3mm 5mm;
      min-width: 38mm;
    }
    .feat-icon { font-size: 16pt; }
    .feat-text { font-size: 8pt; font-weight: 700; color: #2e7d32; letter-spacing: 1px; text-align: center; }

    /* ── 分隔線 ── */
    .divider {
      border: none; border-top: 1.5pt dashed #a5d6a7;
      margin: 0 10mm;
      flex-shrink: 0;
    }

    /* ── 警語 + 專線 ── */
    .hotline-section {
      padding: 4mm 10mm;
      text-align: center;
      flex-shrink: 0;
    }
    .smoking-warning {
      display: inline-block;
      background: #fff3e0;
      border: 1.5pt solid #ff9800;
      border-radius: 3mm;
      padding: 2mm 6mm;
      font-size: 9pt;
      font-weight: 700;
      color: #e65100;
      letter-spacing: 1px;
      margin-bottom: 3mm;
    }
    .hotline-label { font-size: 9pt; color: #555; letter-spacing: 2px; margin-bottom: 1mm; }
    .hotline-number {
      font-size: 22pt; font-weight: 900;
      color: #1b5e20; letter-spacing: 3px;
    }
    .hotline-hours { font-size: 8pt; color: #888; margin-top: 1mm; letter-spacing: 1px; }

    /* ── Footer ── */
    .footer {
      background: #2e7d32;
      padding: 4mm 10mm;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .footer-info { color: white; }
    .footer-name { font-size: 11pt; font-weight: 800; letter-spacing: 1px; }
    .footer-addr { font-size: 8pt; opacity: .85; margin-top: 1mm; }
    .footer-phone {
      color: white; font-size: 13pt; font-weight: 900;
      letter-spacing: 2px;
    }

    @media print {
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
